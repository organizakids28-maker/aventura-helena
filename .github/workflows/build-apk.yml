name: Build APK - Aventura da Helena

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Baixar Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L \
            "https://raw.githubusercontent.com/gradle/gradle/v6.5/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          (
            wget -q https://services.gradle.org/distributions/gradle-6.5-bin.zip
            unzip -q gradle-6.5-bin.zip
            sudo mv gradle-6.5 /opt/gradle
            sudo ln -s /opt/gradle/bin/gradle /usr/local/bin/gradle
            echo "USAR_GRADLE_DIRETO=true" >> $GITHUB_ENV
          )

      - name: Tornar gradlew executavel
        run: chmod +x gradlew

      - name: Cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle') }}

      - name: Compilar APK
        run: |
          if [ "$USAR_GRADLE_DIRETO" = "true" ]; then
            gradle assembleDebug
          else
            ./gradlew assembleDebug --no-daemon
          fi

      - name: Disponibilizar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: aventura-helena-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
